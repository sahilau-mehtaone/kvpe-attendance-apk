name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # GitHub ubuntu-latest has Android SDK pre-installed
      # ANDROID_HOME is typically /usr/local/lib/android/sdk
      - name: Show pre-installed Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"

      - name: Install API 34 if needed
        run: |
          if [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            echo "Installing android-34..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
              "platforms;android-34" "build-tools;34.0.0" --no_https || true
          else
            echo "android-34 already installed"
          fi

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install Gradle 8.6
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.6-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: /opt/gradle/gradle-8.6/bin/gradle assembleDebug --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kvpe-attendance-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
