name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install SDK platform-34
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager 2>/dev/null | head -1)
          yes | $SDKMANAGER --licenses 2>/dev/null || true
          $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kvpe-attendance-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
