name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Show pre-installed Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms dir"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools dir"
          ls $ANDROID_HOME/cmdline-tools/ 2>/dev/null || echo "no cmdline-tools dir"

      - name: Install missing SDK components (if needed)
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager 2>/dev/null | head -1)
          echo "sdkmanager at: $SDKMANAGER"
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER --licenses 2>/dev/null || true
            $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" || true
          else
            echo "sdkmanager not found, hoping pre-installed SDK is enough"
          fi

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kvpe-attendance-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
